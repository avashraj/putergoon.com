<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}putergoon.com{{ else }}{{ .Title }} | putergoon.com{{ end }}</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    .page {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 30px;
    }

    .site-title {
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
      color: #111;
    }

    .menu {
      display: flex;
      gap: 18px;
    }

    .menu a {
      color: #111;
      text-decoration: none;
      font-weight: 600;
      text-transform: lowercase;
    }

    .menu a:hover {
      text-decoration: underline;
    }

    .notes-list article {
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="site-title" href="{{ "/" | relURL }}">putergoon.com</a>
      <nav class="menu">
        <a href="{{ "/blogs/" | relURL }}">blogs</a>
        <a href="{{ "/notes/" | relURL }}">notes</a>
        <a href="{{ "/store/" | relURL }}">store</a>
      </nav>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </div>
</body>
</html>
