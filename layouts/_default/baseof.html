<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}putergoon.com{{ else }}{{ .Title }} | putergoon.com{{ end }}</title>
  <style>
    @font-face {
      font-family: "Alike Angular";
      src: url("{{ "fonts/Alike_Angular/AlikeAngular-Regular.ttf" | relURL }}") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Geom";
      src: url("{{ "fonts/Geom/Geom-VariableFont_wght.ttf" | relURL }}") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Geom";
      src: url("{{ "fonts/Geom/Geom-Italic-VariableFont_wght.ttf" | relURL }}") format("truetype");
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    body {
      margin: 0;
      font-family: "Geom", Arial, sans-serif;
      line-height: 1.5;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Alike Angular", serif;
      font-weight: 400;
    }

    .page {
      max-width: 800px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 30px;
    }

    .site-title {
      font-family: "Alike Angular", serif;
      font-size: 1.8rem;
      font-weight: 400;
      text-decoration: none;
      color: #111;
    }

    .menu {
      display: flex;
      gap: 18px;
    }

    .menu a {
      font-family: "Alike Angular", serif;
      color: #111;
      text-decoration: none;
      font-weight: 400;
      text-transform: lowercase;
    }

    .menu a:hover {
      text-decoration: underline;
    }

    .notes-list {
      width: 100%;
      margin-left: 0;
      margin-right: 0;
    }

    .notes-list article {
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
    }

    .blogs-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .blog-link {
      font-family: "Alike Angular", serif;
      color: #111;
      text-decoration: none;
      text-transform: lowercase;
      width: fit-content;
    }

    .blog-link:hover {
      text-decoration: underline;
    }

    .create-list {
      width: 100%;
      margin-left: 0;
      margin-right: 0;
    }

    .create-list article {
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
    }

    .create-list video {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 10px;
    }

    .home-divider {
      border: 0;
      border-top: 1px dotted #8a1f4d;
      margin: 28px 0 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="site-title" href="{{ "/" | relURL }}">putergoon.com</a>
      <nav class="menu">
        <a href="{{ "/notes/" | relURL }}">notes</a>
        <a href="{{ "/blogs/" | relURL }}">blogs</a>
        <a href="{{ "/create/" | relURL }}">create</a>
        <a href="{{ "/store/" | relURL }}">store</a>
      </nav>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </div>
</body>
</html>
